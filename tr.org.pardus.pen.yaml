app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:

  - name: pardus-pen
    buildsystem: meson
    build-options:
      env:
        PATH: /app/bin:/usr/libexec:/usr/bin
    config-opts:
      - -Dqt=6
      - --prefix=/app
    sources:
      - type: git
        url: https://github.com/pardus/pardus-pen
        branch: master

